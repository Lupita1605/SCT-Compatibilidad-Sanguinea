<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCT - Iniciar Sesión</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        :root {
            --verde-sct: #208271;
            --verde-hover: #1a6b5d;
            --verde-claro: #d1fae5;
            --gris-fondo: #f4f7f6;
            --blanco: #ffffff;
            --texto-oscuro: #1a2c3e;
            --texto-suave: #5b6e8c;
            --sombra-card: 0 8px 30px rgba(0,0,0,0.12);
            --gradiente-hero: linear-gradient(135deg, #208271 0%, #1a6b5d 50%, #0f766e 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, Roboto, sans-serif;
            background: var(--gris-fondo);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 440px;
        }

        .login-card {
            background: var(--blanco);
            border-radius: 24px;
            padding: 48px 40px;
            box-shadow: var(--sombra-card);
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-logo {
            width: 64px;
            height: 64px;
            background: var(--verde-claro);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin: 0 auto 20px;
        }

        .login-title {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--texto-oscuro);
            margin-bottom: 8px;
        }

        .login-subtitle {
            color: var(--texto-suave);
            font-size: 1rem;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #4b5563;
            margin-bottom: 8px;
        }

        .input-field {
            width: 100%;
            padding: 14px 18px;
            font-size: 1rem;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            background: white;
            color: var(--texto-oscuro);
            transition: all 0.3s;
            font-family: inherit;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--verde-sct);
            box-shadow: 0 0 0 4px rgba(32, 130, 113, 0.1);
        }

        .input-field::placeholder {
            color: #9aaebf;
        }

        .row-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 16px 0 28px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            color: #2d3a4b;
            font-weight: 500;
        }

        .checkbox-wrapper input {
            width: 18px;
            height: 18px;
            accent-color: var(--verde-sct);
            cursor: pointer;
        }

        .forgot-link {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--verde-sct);
            text-decoration: none;
            transition: color 0.2s;
        }

        .forgot-link:hover {
            color: var(--verde-hover);
            text-decoration: underline;
        }

        .btn-login {
            background: var(--verde-sct);
            color: white;
            border: none;
            border-radius: 12px;
            width: 100%;
            padding: 16px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
            box-shadow: 0 4px 15px rgba(32, 130, 113, 0.3);
        }

        .btn-login:hover {
            background: var(--verde-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(32, 130, 113, 0.4);
        }

        .register-footer {
            text-align: center;
            margin-top: 28px;
            padding-top: 24px;
            border-top: 1px solid #edf2f7;
            font-size: 0.95rem;
            color: #5c6f87;
        }

        .register-footer a {
            color: var(--verde-sct);
            font-weight: 700;
            text-decoration: none;
        }

        .register-footer a:hover {
            text-decoration: underline;
        }

        .error-message {
            background: #fee2e2;
            border-left: 4px solid #dc3545;
            color: #991b1b;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 8px;
        }

        .error-message.show {
            display: flex;
        }

        @media (max-width: 480px) {
            .login-card { padding: 32px 24px; }
            .login-title { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo">🩸</div>
                <h1 class="login-title">Bienvenido</h1>
                <p class="login-subtitle">Inicia sesión en tu cuenta</p>
            </div>

            <div class="error-message" id="errorMsg">
                <span>⚠️</span> <span id="errorText">Correo o contraseña incorrectos.</span>
            </div>

            <form method="POST" action="/login" id="loginForm">
                <div class="input-group">
                    <label class="input-label" for="correo">Correo Electrónico</label>
                    <input type="email" id="correo" name="correo" class="input-field"
                           placeholder="tu@email.com" required autocomplete="email">
                </div>

                <div class="input-group">
                    <label class="input-label" for="password">Contraseña</label>
                    <input type="password" id="password" name="password" class="input-field"
                           placeholder="••••••••" required autocomplete="current-password">
                </div>

                <div class="row-options">
                    <label class="checkbox-wrapper">
                        <input type="checkbox" name="recordarme" value="1">
                        <span>Recordarme</span>
                    </label>
                    <a href="/recuperar" class="forgot-link">¿Olvidaste tu contraseña?</a>
                </div>

                <button type="submit" class="btn-login">Iniciar Sesión</button>
            </form>

            <div class="register-footer">
                ¿No tienes una cuenta? <a href="/registro">Regístrate</a>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const urlParams = new URLSearchParams(window.location.search);
            const errorParam = urlParams.get('error');
            const errorMsgDiv = document.getElementById('errorMsg');
            const errorTextSpan = document.getElementById('errorText');

            if (errorParam === '1' || errorParam === 'credenciales' || errorParam === 'invalid') {
                if (errorMsgDiv) {
                    errorMsgDiv.classList.add('show');
                    errorTextSpan.innerText = 'Correo o contraseña incorrectos.';
                }
            }

            const form = document.getElementById('loginForm');
            if (form) {
                form.addEventListener('submit', function(event) {
                    const emailInput = document.getElementById('correo');
                    const passInput = document.getElementById('password');

                    if (!emailInput.value.trim() || !passInput.value.trim()) {
                        event.preventDefault();
                        if (errorMsgDiv && errorTextSpan) {
                            errorTextSpan.innerText = 'Completa todos los campos.';
                            errorMsgDiv.classList.add('show');
                        }
                        return false;
                    }
                    return true;
                });
            }
        })();
    </script>
</body>
</html>
